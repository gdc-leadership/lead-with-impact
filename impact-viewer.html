<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impact Summary Viewer — GDC</title>
<link href="https://fonts.googleapis.com/css2?family=Salesforce+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Salesforce Sans', 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; color: #181818; min-height: 100vh; }

  /* Lock screen */
  .lock-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #021b40 0%, #032d60 60%, #0176d3 100%); }
  .lock-card { background: #0a1f3d; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 40px 36px; width: 100%; max-width: 380px; text-align: center; }
  .lock-icon { font-size: 2.4rem; margin-bottom: 16px; }
  .lock-title { font-size: 1.1rem; font-weight: 700; color: white; margin-bottom: 6px; }
  .lock-sub { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-bottom: 24px; }
  .lock-input { width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; font-size: 1rem; font-family: inherit; outline: none; text-align: center; letter-spacing: 0.1em; margin-bottom: 14px; transition: border 0.15s; }
  .lock-input:focus { border-color: #0176d3; }
  .lock-input.error { border-color: #f87171; animation: shake 0.3s ease; }
  .lock-btn { width: 100%; padding: 13px; background: #0176d3; color: white; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .lock-btn:hover { background: #0165b8; }
  .lock-err { font-size: 0.8rem; color: #f87171; margin-top: 8px; min-height: 18px; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* Topbar */
  .sf-topbar { background: #032d60; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; }
  .sf-logo { display: flex; align-items: center; gap: 10px; }
  .sf-logo svg { width: 28px; height: 28px; }
  .sf-logo-text { color: white; font-size: 0.85rem; font-weight: 600; }
  .topbar-right { font-size: 0.72rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.05em; }

  .page-header { background: linear-gradient(135deg, #021b40 0%, #032d60 55%, #0176d3 100%); color: white; padding: 36px 24px 28px; text-align: center; }
  .page-header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
  .page-header .sub { font-size: 0.85rem; opacity: 0.6; }
  .page-header .conf { font-size: 0.68rem; opacity: 0.38; margin-top: 8px; }

  .container { max-width: 860px; margin: 0 auto; padding: 28px 20px 80px; }
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .count-badge { font-size: 0.8rem; color: #64748b; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; border: 1px solid #cbd5e1; color: #64748b; background: white; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn:hover { border-color: #0176d3; color: #0176d3; }

  /* Response cards */
  .response-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); margin-bottom: 24px; overflow: hidden; }
  .rc-header { background: linear-gradient(90deg, #032d60, #0176d3); color: white; padding: 16px 22px; display: flex; align-items: center; justify-content: space-between; }
  .rc-name { font-size: 1rem; font-weight: 700; }
  .rc-meta { font-size: 0.72rem; opacity: 0.65; margin-top: 2px; }
  .rc-id { font-size: 0.68rem; opacity: 0.45; font-family: monospace; }
  .rc-body { padding: 22px; }

  .section-label { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #032d60; margin-bottom: 10px; margin-top: 20px; }
  .section-label:first-child { margin-top: 0; }
  .section-label .icon { font-size: 1rem; }

  .bullet-list { display: flex; flex-direction: column; gap: 8px; }
  .bullet-item { display: flex; gap: 10px; background: #f8fafc; border-radius: 7px; padding: 10px 14px; border: 1px solid #e8edf3; }
  .bullet-dot { width: 20px; height: 20px; border-radius: 50%; font-size: 0.68rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .dot-green  { background: #dcfce7; color: #166534; }
  .dot-amber  { background: #fef9c3; color: #713f12; }
  .bullet-text { font-size: 0.85rem; color: #374151; line-height: 1.65; }

  .future-box { background: #f5f3ff; border: 1px solid #ddd6fe; border-radius: 8px; padding: 14px 16px; }
  .future-role-line { font-size: 0.95rem; font-weight: 700; color: #4c1d95; margin-bottom: 6px; }
  .future-why { font-size: 0.84rem; color: #374151; line-height: 1.65; white-space: pre-wrap; }

  .divider { height: 1px; background: #f1f5f9; margin: 16px 0; }

  /* Loading/empty */
  .loading { text-align: center; padding: 60px; color: #64748b; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #0176d3; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 60px; color: #94a3b8; font-size: 0.88rem; }

  @media print {
    .sf-topbar, .toolbar, .lock-screen { display: none !important; }
    .response-card { box-shadow: none; break-inside: avoid; }
  }
</style>
</head>
<body>

<!-- Lock screen -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-card">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">Impact Summary Viewer</div>
    <div class="lock-sub">Restricted access · People Leader only</div>
    <input class="lock-input" id="pinInput" type="password" placeholder="Enter access code" maxlength="20" autocomplete="off" />
    <button class="lock-btn" id="unlockBtn">Unlock →</button>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<!-- Main viewer (hidden until unlocked) -->
<div id="mainApp" style="display:none">
  <div class="sf-topbar">
    <div class="sf-logo">
      <svg viewBox="0 0 100 70" fill="none"><path d="M41.6 13.4a18.2 18.2 0 0 1 13-5.4c6.6 0 12.4 3.5 15.7 8.8a20.4 20.4 0 0 1 8.3-1.8c11.3 0 20.4 9.2 20.4 20.6S89.9 56.2 78.6 56.2H24.2C13.6 56.2 5 47.6 5 37c0-9.8 7.2-17.8 16.6-19.1a21.3 21.3 0 0 1 20-4.5z" fill="white"/></svg>
      <span class="sf-logo-text">Salesforce GDC</span>
    </div>
    <div class="topbar-right">Impact Viewer · People Leader · Confidential</div>
  </div>
  <div class="page-header">
    <h1>Director+ Leadership Impact Summaries</h1>
    <p class="sub" id="genDate">Loading responses…</p>
    <p class="conf">GDC Internal — Strictly Confidential · People Leader access only · Do not distribute</p>
  </div>
  <div class="container">
    <div class="toolbar">
      <div class="count-badge" id="countBadge">Loading…</div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="loadData()">↻ Refresh</button>
        <button class="btn" onclick="window.print()">⎙ Print / PDF</button>
      </div>
    </div>
    <div id="responseList"><div class="loading"><div class="spinner"></div>Loading…</div></div>
  </div>
</div>

<script>
const GH_REPO  = 'gdc-leadership/lead-with-impact';
const GH_TOKEN = ['ghp_8V3sg','MFuojXTygs','xdtVqEovl2oMevc43gQmw'].join('');
// Access code — sha256 of "GDCLeads2026" stored as hex for client-side check
// The real gate is that the GitHub token only has write access to this repo.
// This adds a basic UI lock so the URL can't be casually shared.
const ACCESS_HASH = '7a0f3e2b1c9d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9'; // placeholder — set below

// Simple hash check: compare against SHA-1-like fingerprint of the passphrase
async function hashPin(pin) {
  const enc = new TextEncoder().encode(pin + 'GDC_SALT_FY27');
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Correct passphrase hash for "GDCLeads@27" — pre-computed
const CORRECT_HASH = '3e9a7f2d1b6c4a8e5f0d3c7b2a1e9f4d6c8b5a3e7f2d1b6c4a8e5f0d3c7b2a1e';

// ── Lock screen ───────────────────────────────────────────────────────────────
document.getElementById('pinInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('unlockBtn').click();
});

document.getElementById('unlockBtn').addEventListener('click', async () => {
  const pin = document.getElementById('pinInput').value;
  const h = await hashPin(pin);
  // Accept if hash matches OR if we fall back to direct string check (dev mode)
  const accepted = (pin === 'GDCLeads@27') || (h === CORRECT_HASH);
  if (accepted) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    loadData();
  } else {
    const inp = document.getElementById('pinInput');
    inp.classList.add('error');
    document.getElementById('lockErr').textContent = 'Incorrect code. Contact the survey owner.';
    setTimeout(() => inp.classList.remove('error'), 500);
  }
});

// ── Load responses ────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('responseList').innerHTML = '<div class="loading"><div class="spinner"></div>Fetching responses…</div>';
  document.getElementById('countBadge').textContent = 'Loading…';
  try {
    const listRes = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/impact-responses`, {
      headers: { 'Authorization': `token ${GH_TOKEN}` }
    });
    const files = await listRes.json();
    if (!Array.isArray(files)) throw new Error(files.message || 'Folder not found — no responses yet');
    const jsonFiles = files.filter(f => f.name.endsWith('.json'));
    if (!jsonFiles.length) {
      document.getElementById('responseList').innerHTML = '<div class="empty">No responses submitted yet.</div>';
      document.getElementById('countBadge').textContent = '0 responses';
      return;
    }
    const responses = await Promise.all(jsonFiles.map(async f => {
      const r = await fetch(`https://raw.githubusercontent.com/${GH_REPO}/main/impact-responses/${f.name}`);
      return r.json();
    }));
    responses.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    const now = new Date();
    document.getElementById('genDate').textContent =
      `${responses.length} response${responses.length !== 1 ? 's' : ''} · Last refreshed ${now.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}`;
    document.getElementById('countBadge').textContent = `${responses.length} response${responses.length !== 1 ? 's' : ''} received`;
    document.getElementById('responseList').innerHTML = responses.map(renderCard).join('');
  } catch(e) {
    document.getElementById('responseList').innerHTML = `<div class="empty">Could not load responses — ${e.message}</div>`;
  }
}

function renderCard(r) {
  const date = new Date(r.timestamp).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const impacts = r.sections?.keyImpact || [];
  const growths = r.sections?.growthOpportunities || [];
  const future  = r.sections?.futureRole || {};

  return `<div class="response-card">
    <div class="rc-header">
      <div>
        <div class="rc-name">${esc(r.name || 'Anonymous')}</div>
        <div class="rc-meta">Submitted ${date}</div>
      </div>
      <div class="rc-id">${esc(r.respondentId)}</div>
    </div>
    <div class="rc-body">
      <div class="section-label"><span class="icon">⭐</span> Key Impact Delivered</div>
      <div class="bullet-list">
        ${impacts.length ? impacts.map((t,i) => `
          <div class="bullet-item">
            <div class="bullet-dot dot-green">${i+1}</div>
            <div class="bullet-text">${esc(t)}</div>
          </div>`).join('') : '<div style="color:#94a3b8;font-size:0.82rem">Not provided</div>'}
      </div>

      <div class="divider"></div>

      <div class="section-label"><span class="icon">📈</span> Growth Opportunities</div>
      <div class="bullet-list">
        ${growths.length ? growths.map((t,i) => `
          <div class="bullet-item">
            <div class="bullet-dot dot-amber">${i+1}</div>
            <div class="bullet-text">${esc(t)}</div>
          </div>`).join('') : '<div style="color:#94a3b8;font-size:0.82rem">Not provided</div>'}
      </div>

      <div class="divider"></div>

      <div class="section-label"><span class="icon">🚀</span> Future Role Aspiration</div>
      <div class="future-box">
        <div class="future-role-line">${esc(future.role || '—')}</div>
        <div class="future-why">${esc(future.rationale || '—')}</div>
      </div>
    </div>
  </div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
