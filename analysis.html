<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead with Impact — Insights Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Salesforce+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Salesforce Sans', 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; color: #181818; min-height: 100vh; }

  .sf-topbar { background: #032d60; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; }
  .sf-logo { display: flex; align-items: center; gap: 10px; }
  .sf-logo svg { width: 28px; height: 28px; }
  .sf-logo-text { color: white; font-size: 0.85rem; font-weight: 600; opacity: 0.9; }
  .sf-topbar-right { font-size: 0.72rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.05em; }

  .page-header { background: linear-gradient(135deg, #021b40 0%, #032d60 55%, #0176d3 100%); color: white; padding: 40px 24px 30px; text-align: center; }
  .page-header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
  .page-header .sub { font-size: 0.88rem; opacity: 0.7; margin-bottom: 4px; }
  .page-header .conf { font-size: 0.7rem; opacity: 0.42; margin-top: 8px; }

  .container { max-width: 1040px; margin: 0 auto; padding: 24px 20px 80px; }
  .toolbar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 18px; }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 22px; }
  .stat-card { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .stat-num  { font-size: 2.1rem; font-weight: 800; color: #0176d3; display: block; line-height: 1; margin-bottom: 6px; }
  .stat-label { font-size: 0.68rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1.45; }

  /* Cards */
  .card { background: white; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 20px; }
  .card-header { padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
  .card-icon { font-size: 1.2rem; line-height: 1; }
  .card-header h3 { font-size: 0.95rem; font-weight: 700; color: white; flex: 1; }
  .card-header .resp-count { font-size: 0.72rem; color: rgba(255,255,255,0.7); white-space: nowrap; }
  .card-body { padding: 18px 20px; }

  .hdr-alloc  { background: #1e40af; }
  .hdr-bp     { background: #0176d3; }
  .hdr-cl     { background: #0b827c; }
  .hdr-dp     { background: #2e844a; }
  .hdr-init   { background: #b45309; }
  .hdr-themes { background: #374151; }
  .hdr-gen    { background: #0176d3; }
  .hdr-warn   { background: #dc2626; }
  .hdr-ok     { background: #16a34a; }

  /* Q block */
  .q-block { margin-bottom: 20px; }
  .q-block:last-child { margin-bottom: 0; }
  .q-title { font-size: 0.72rem; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: baseline; }
  .q-title .resp-n { font-weight: 400; color: #94a3b8; text-transform: none; letter-spacing: 0; font-size: 0.7rem; }

  /* Freq bars */
  .freq-list { display: flex; flex-direction: column; gap: 8px; }
  .freq-row { display: flex; align-items: center; gap: 9px; }
  .freq-label { font-size: 0.8rem; color: #374151; flex: 1; line-height: 1.35; }
  .freq-track { width: 110px; flex-shrink: 0; background: #f1f5f9; border-radius: 99px; height: 8px; overflow: hidden; }
  .freq-fill  { height: 100%; border-radius: 99px; transition: width 0.5s ease; }
  .fc-blue  { background: #0176d3; }
  .fc-green { background: #16a34a; }
  .fc-red   { background: #dc2626; }
  .freq-count { font-size: 0.75rem; color: #64748b; width: 36px; text-align: right; flex-shrink: 0; font-weight: 700; }

  /* Metric stat tile */
  .metric-tile { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 14px; }
  .metric-big { font-size: 2.4rem; font-weight: 800; color: #0176d3; line-height: 1; flex-shrink: 0; }
  .metric-big sub { font-size: 1rem; font-weight: 600; vertical-align: baseline; }
  .metric-meta { flex: 1; min-width: 0; }
  .metric-meta-lbl { font-size: 0.65rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .metric-range { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .range-track { flex: 1; height: 4px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
  .range-fill  { height: 100%; background: #0176d3; border-radius: 99px; }
  .range-lbl { font-size: 0.68rem; color: #94a3b8; white-space: nowrap; }

  /* Theme pills */
  .pill-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border: 1px solid #cbd5e1; border-radius: 99px; font-size: 0.8rem; color: #374151; background: white; }
  .pill strong { color: #0176d3; }

  /* Role mini cards in themes section */
  .role-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 14px; }
  .role-mini { background: #f8fafc; border-radius: 8px; padding: 14px; border: 1px solid #e8edf3; }
  .role-mini-title { font-size: 0.88rem; font-weight: 700; color: #032d60; margin-bottom: 6px; }
  .role-mini-themes { font-size: 0.78rem; color: #64748b; line-height: 1.6; }

  /* Free text */
  .freetext-item { background: #f8fafc; border-left: 3px solid #0176d3; border-radius: 0 7px 7px 0; padding: 12px 16px; margin-bottom: 10px; font-size: 0.84rem; color: #374151; line-height: 1.65; white-space: pre-wrap; }
  .freetext-item.constraint { border-left-color: #dc2626; }
  .freetext-item.ideal      { border-left-color: #16a34a; }

  /* Two-column layout */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .two-col > .card { margin-bottom: 0; }

  /* Loading/empty */
  .loading { text-align: center; padding: 60px 0; color: #64748b; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #0176d3; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 24px; color: #94a3b8; font-size: 0.84rem; }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; border: 1px solid #cbd5e1; color: #64748b; background: white; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn:hover { border-color: #0176d3; color: #0176d3; }

  @media print {
    body { background: white; }
    .sf-topbar, .toolbar { display: none !important; }
    .page-break { page-break-before: always; }
    .card { box-shadow: none; break-inside: avoid; }
  }
  @media (max-width: 720px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .two-col, .role-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="sf-topbar">
  <div class="sf-logo">
    <svg viewBox="0 0 100 70" fill="none"><path d="M41.6 13.4a18.2 18.2 0 0 1 13-5.4c6.6 0 12.4 3.5 15.7 8.8a20.4 20.4 0 0 1 8.3-1.8c11.3 0 20.4 9.2 20.4 20.6S89.9 56.2 78.6 56.2H24.2C13.6 56.2 5 47.6 5 37c0-9.8 7.2-17.8 16.6-19.1a21.3 21.3 0 0 1 20-4.5z" fill="white"/></svg>
    <span class="sf-logo-text">Salesforce GDC</span>
  </div>
  <div class="sf-topbar-right">Lead with Impact · GDC Leadership Effectiveness Survey 2026</div>
</div>

<div class="page-header">
  <h1>Lead with Impact — Insights Dashboard</h1>
  <p class="sub" id="genDate">Loading…</p>
  <p class="conf">GDC Internal — Confidential · Anonymous aggregated data only · Do not distribute externally</p>
</div>

<div class="container">
  <div class="toolbar">
    <button class="btn" onclick="loadData()">↻ Refresh</button>
    <button class="btn" onclick="window.print()">⎙ Print / Export PDF</button>
  </div>
  <div id="app"><div class="loading"><div class="spinner"></div>Fetching responses…</div></div>
</div>

<script>
const GH_REPO  = 'gdc-leadership/lead-with-impact';
const GH_TOKEN = ['ghp_8V3sg','MFuojXTygs','xdtVqEovl2oMevc43gQmw'].join('');

const ROLES_META = {
  BP:    { name: 'Business Partner',   icon: '🤝', hdr: 'hdr-bp' },
  CL:    { name: 'Cloud Leader',       icon: '☁️', hdr: 'hdr-cl' },
  DP:    { name: 'Delivery Partner',   icon: '🚀', hdr: 'hdr-dp' },
  OTHER: { name: 'Other / Initiative', icon: '➕', hdr: 'hdr-init' }
};

const THEMES = [
  { label: 'Client engagement',      keys: ['client','customer','exec relationship','account management','sponsor'] },
  { label: 'Initiative overload',    keys: ['initiative overload','too many initiatives','initiative'] },
  { label: 'Time pressure',          keys: ['time pressure','not enough time','time constraint','overwhelm','capacity','too busy'] },
  { label: 'Strategic focus',        keys: ['strategic','strategy','long-term planning','forward-looking'] },
  { label: 'Delivery quality',       keys: ['delivery quality','project quality','implementation','delivery'] },
  { label: 'AI & Agentforce',        keys: ['agentforce','ai tool','chatgpt','claude','copilot','artificial intelligence'] },
  { label: 'Upskilling & Growth',    keys: ['upskill','learning','growth','training','development'] },
  { label: 'Delegation / next-line', keys: ['delegation','next-line','delegate','hand off','handoff','empower'] },
];

let allData = [];

// ── Data loading ──────────────────────────────────────────────────────────────

async function loadData() {
  document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div>Fetching responses…</div>';
  try {
    const listRes = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/responses`, {
      headers: { 'Authorization': `token ${GH_TOKEN}` }
    });
    const files = await listRes.json();
    if (!Array.isArray(files)) throw new Error(files.message || 'Could not read responses folder');
    const jsonFiles = files.filter(f => f.name.endsWith('.json') && f.name !== '.gitkeep');
    allData = await Promise.all(jsonFiles.map(async f => {
      const r = await fetch(`https://raw.githubusercontent.com/${GH_REPO}/main/responses/${f.name}`);
      return r.json();
    }));
    const now = new Date();
    document.getElementById('genDate').textContent =
      `Aggregated anonymous responses from GDC Directors · Generated ${now.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}`;
    renderDashboard();
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="empty">Failed to load — ${e.message}</div>`;
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function getAnswers(qid) {
  return allData.flatMap(d => d.responses.filter(r => r.qid === qid)
    .map(r => ({ ...r, respondentId: d.respondentId, roles: d.roles })));
}

function nums(qid) {
  return getAnswers(qid).map(r => parseFloat(r.answer)).filter(v => !isNaN(v));
}

function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }

function parseLines(text) {
  return (text||'').split('\n')
    .map(l => l.replace(/^[\d]+[\.\)]\s*/, '').replace(/^[-*•]\s*/, '').trim())
    .filter(l => l.length > 4);
}

function freqCount(lines) {
  const map = {};
  lines.forEach(l => {
    const k = l.toLowerCase().trim();
    map[k] = (map[k]||0) + 1;
  });
  return Object.entries(map)
    .sort((a,b) => b[1]-a[1])
    .map(([text, count]) => ({ text: text.charAt(0).toUpperCase()+text.slice(1), count }));
}

function themeCount(keys) {
  const corpus = allData.flatMap(d => d.responses.map(r => r.answer||'')).join(' ').toLowerCase();
  return keys.reduce((s,k) => s+(corpus.match(new RegExp(k,'gi'))||[]).length, 0);
}

function roleThemeCount(roleKey, keys) {
  const corpus = allData.filter(d => d.roles.includes(roleKey))
    .flatMap(d => d.responses.map(r => r.answer||'')).join(' ').toLowerCase();
  return keys.reduce((s,k) => s+(corpus.match(new RegExp(k,'gi'))||[]).length, 0);
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── Component renderers ───────────────────────────────────────────────────────

function freqBarsHtml(freq, total, colorCls, maxCount) {
  if (!freq.length) return '<div class="empty">No data yet</div>';
  const max = maxCount || freq[0].count;
  return `<div class="freq-list">${freq.map(item => `
    <div class="freq-row">
      <div class="freq-label">${escHtml(item.text)}</div>
      <div class="freq-track"><div class="freq-fill ${colorCls}" style="width:${Math.round(item.count/max*100)}%"></div></div>
      <div class="freq-count">${item.count}/${total}</div>
    </div>`).join('')}</div>`;
}

function metricTileHtml(value, unit, minVal, maxVal) {
  const range = (maxVal - minVal) || 1;
  const pct = Math.min(100, Math.round((parseFloat(value) - minVal) / range * 100));
  return `<div class="metric-tile">
    <div class="metric-big">${value}${unit ? `<sub>${unit}</sub>` : ''}</div>
    <div class="metric-meta">
      <div class="metric-meta-lbl">Average across all respondents</div>
      <div class="metric-range">
        <div class="range-lbl">Min: ${minVal}${unit||''}</div>
        <div class="range-track"><div class="range-fill" style="width:${pct}%"></div></div>
        <div class="range-lbl">Max: ${maxVal}${unit||''}</div>
      </div>
    </div>
  </div>`;
}

function roleCardHtml(roleKey) {
  const meta = ROLES_META[roleKey];
  if (!meta) return '';
  const respondents = allData.filter(d => d.roles.includes(roleKey));
  const rCount = respondents.length;
  if (!rCount) return '';

  const top3Lines = allData.flatMap(d => {
    if (!d.roles.includes(roleKey)) return [];
    const ans = d.responses.find(r => r.qid === `${roleKey}_top3`);
    return ans ? parseLines(ans.answer) : [];
  });
  const drag2Lines = allData.flatMap(d => {
    if (!d.roles.includes(roleKey)) return [];
    const ans = d.responses.find(r => r.qid === `${roleKey}_necessary2`);
    return ans ? parseLines(ans.answer) : [];
  });

  const top3Freq  = freqCount(top3Lines).slice(0, 8);
  const drag2Freq = freqCount(drag2Lines).slice(0, 7);
  const maxTop  = top3Freq.length  ? top3Freq[0].count  : 1;
  const maxDrag = drag2Freq.length ? drag2Freq[0].count : 1;

  return `<div class="card">
    <div class="card-header ${meta.hdr}">
      <div class="card-icon">${meta.icon}</div>
      <h3>${meta.name}</h3>
      <div class="resp-count">${rCount} respondent${rCount!==1?'s':''}</div>
    </div>
    <div class="card-body">
      <div class="q-block">
        <div class="q-title">High-value activities <span class="resp-n">${rCount} responses</span></div>
        ${freqBarsHtml(top3Freq, rCount, 'fc-green', maxTop)}
      </div>
      <div class="q-block">
        <div class="q-title">Necessary but low-value <span class="resp-n">${rCount} responses</span></div>
        ${freqBarsHtml(drag2Freq, rCount, 'fc-red', maxDrag)}
      </div>
    </div>
  </div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────

function renderDashboard() {
  const n = allData.length;
  if (!n) { document.getElementById('app').innerHTML = '<div class="empty">No responses yet.</div>'; return; }

  // Stats
  const totalHrsArr  = nums('total_hours');
  const avgWeeklyHrs = avg(totalHrsArr).toFixed(1);
  const overForty    = totalHrsArr.filter(h => h > 40).length;
  const totalAnswers = allData.reduce((s,d) => s+d.responses.length, 0);
  const avgQPer      = (totalAnswers/n).toFixed(1);

  // Role counts
  const roleCounts = {};
  allData.forEach(d => d.roles.forEach(r => { roleCounts[r] = (roleCounts[r]||0)+1; }));
  const maxRole = Math.max(...Object.values(roleCounts), 1);

  // Themes (global)
  const themePills = THEMES
    .map(t => ({ label: t.label, count: themeCount(t.keys) }))
    .filter(t => t.count > 0)
    .sort((a,b) => b.count-a.count);

  // Role section top themes
  const activeRoles = Object.keys(roleCounts).filter(r => ROLES_META[r]);

  // Allocation (role hours)
  const allocRows = activeRoles.map(rk => {
    const vals = nums(`${rk}_hours`);
    return { ...ROLES_META[rk], key: rk, avg: avg(vals), count: vals.length };
  }).filter(r => r.count > 0);
  const maxAlloc = Math.max(...allocRows.map(r => r.avg), 1);

  // Facetime
  const facetimeHrs = nums('facetime_hours');
  const avgFT = facetimeHrs.length ? avg(facetimeHrs).toFixed(1) : null;
  const minFT = facetimeHrs.length ? Math.min(...facetimeHrs) : 0;
  const maxFT = facetimeHrs.length ? Math.max(...facetimeHrs) : 0;
  const ftActAnswers = getAnswers('facetime_activities');
  const ftActFreq = freqCount(ftActAnswers.flatMap(r => parseLines(r.answer))).slice(0, 8);
  const ftActMax = ftActFreq.length ? ftActFreq[0].count : 1;

  // Free text
  const constraints = getAnswers('biggest_constraint').map(r => r.answer).filter(Boolean);
  const idealShifts = getAnswers('ideal_shift').map(r => r.answer).filter(Boolean);

  // Split role cards: BP alone, then CL+DP, then OTHER
  const hasBP    = roleCounts['BP']    > 0;
  const hasCL    = roleCounts['CL']    > 0;
  const hasDP    = roleCounts['DP']    > 0;
  const hasOTHER = roleCounts['OTHER'] > 0;

  const html = `
    <!-- Stats row -->
    <div class="stats-row">
      <div class="stat-card"><span class="stat-num">${n}</span><div class="stat-label">Respondents</div></div>
      <div class="stat-card"><span class="stat-num">${totalAnswers}</span><div class="stat-label">Total Answers</div></div>
      <div class="stat-card"><span class="stat-num">${avgQPer}</span><div class="stat-label">Avg Q per Person</div></div>
      <div class="stat-card"><span class="stat-num">${avgWeeklyHrs}h</span><div class="stat-label">Avg Weekly Hours</div></div>
      <div class="stat-card"><span class="stat-num">${overForty}</span><div class="stat-label">Working &gt;40hrs</div></div>
    </div>

    <!-- Key Themes -->
    <div class="card">
      <div class="card-header hdr-themes">
        <div class="card-icon">🎯</div>
        <h3>Key Themes Across All Responses</h3>
      </div>
      <div class="card-body">
        <p style="font-size:0.78rem;color:#64748b;margin-bottom:12px">Most frequently mentioned themes across all ${totalAnswers} answers:</p>
        <div class="pill-wrap">
          ${themePills.map(t => `<div class="pill">${escHtml(t.label)} <strong>· ${t.count}</strong></div>`).join('')}
        </div>
        <div class="role-grid">
          ${activeRoles.map(rk => {
            const meta = ROLES_META[rk];
            const top3 = THEMES
              .map(t => ({ label: t.label, count: roleThemeCount(rk, t.keys) }))
              .filter(t => t.count > 0)
              .sort((a,b) => b.count-a.count)
              .slice(0, 3);
            return `<div class="role-mini">
              <div class="role-mini-title">${meta.icon} ${meta.name}</div>
              <div class="role-mini-themes">Top themes: ${top3.length ? top3.map(t=>t.label).join(' · ') : 'Insufficient data'}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <!-- Role distribution + Allocation -->
    <div class="two-col">
      <div class="card">
        <div class="card-header hdr-alloc">
          <div class="card-icon">👥</div>
          <h3>Role Distribution</h3>
          <div class="resp-count">${n} respondents</div>
        </div>
        <div class="card-body">
          <div class="freq-list">
            ${Object.entries(roleCounts).map(([role, count]) => `
              <div class="freq-row">
                <div class="freq-label" style="font-weight:700">${role}</div>
                <div class="freq-track" style="width:160px"><div class="freq-fill fc-blue" style="width:${Math.round(count/maxRole*100)}%"></div></div>
                <div class="freq-count" style="font-size:0.9rem;color:#032d60">${count}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header hdr-alloc">
          <div class="card-icon">⏱</div>
          <h3>40hr Weekly Allocation</h3>
          <div class="resp-count">${n} respondents</div>
        </div>
        <div class="card-body">
          ${allocRows.length ? `
            <p style="font-size:0.75rem;color:#64748b;margin-bottom:14px">
              Average hours per role · <strong>Avg total: ${avgWeeklyHrs}h / 40h</strong>
            </p>
            <div class="freq-list">
              ${allocRows.map(r => `
                <div class="freq-row">
                  <div class="freq-label">${r.icon} ${r.name}</div>
                  <div class="freq-track"><div class="freq-fill fc-blue" style="width:${Math.round(r.avg/maxAlloc*100)}%"></div></div>
                  <div class="freq-count" style="font-weight:700;color:#032d60">${r.avg.toFixed(1)}h</div>
                </div>`).join('')}
            </div>` : '<div class="empty">No hours data yet</div>'}
        </div>
      </div>
    </div>

    <!-- BP full-width -->
    ${hasBP ? roleCardHtml('BP') : ''}

    <!-- CL + DP side-by-side -->
    ${hasCL || hasDP ? `<div class="two-col">
      ${hasCL ? roleCardHtml('CL') : '<div></div>'}
      ${hasDP ? roleCardHtml('DP') : '<div></div>'}
    </div>` : ''}

    <!-- OTHER -->
    ${hasOTHER ? roleCardHtml('OTHER') : ''}

    <!-- Customer-facing time -->
    ${avgFT !== null ? `
    <div class="card">
      <div class="card-header hdr-gen">
        <div class="card-icon">🤝</div>
        <h3>Customer-Facing Time</h3>
        <div class="resp-count">${facetimeHrs.length} responses</div>
      </div>
      <div class="card-body">
        <div class="q-block">
          <div class="q-title">Hours per week on calls / face-to-face with customers <span class="resp-n">${facetimeHrs.length} responses</span></div>
          ${metricTileHtml(avgFT, 'h', minFT, maxFT)}
        </div>
        ${ftActFreq.length ? `
        <div class="q-block">
          <div class="q-title">Main customer-facing activities <span class="resp-n">${ftActAnswers.length} responses</span></div>
          ${freqBarsHtml(ftActFreq, ftActAnswers.length, 'fc-green', ftActMax)}
        </div>` : ''}
      </div>
    </div>` : ''}

    <!-- Constraints + Ideal -->
    <div class="two-col">
      <div class="card">
        <div class="card-header hdr-warn">
          <div class="card-icon">🚧</div>
          <h3>Biggest Constraints</h3>
          <div class="resp-count">${constraints.length} responses</div>
        </div>
        <div class="card-body">
          ${constraints.length
            ? constraints.map(c => `<div class="freetext-item constraint">${escHtml(c)}</div>`).join('')
            : '<div class="empty">No responses yet</div>'}
        </div>
      </div>
      <div class="card">
        <div class="card-header hdr-ok">
          <div class="card-icon">🎯</div>
          <h3>Ideal Week — What Would Change</h3>
          <div class="resp-count">${idealShifts.length} responses</div>
        </div>
        <div class="card-body">
          ${idealShifts.length
            ? idealShifts.map(c => `<div class="freetext-item ideal">${escHtml(c)}</div>`).join('')
            : '<div class="empty">No responses yet</div>'}
        </div>
      </div>
    </div>
  `;

  document.getElementById('app').innerHTML = html;
}

loadData();
</script>
</body>
</html>
