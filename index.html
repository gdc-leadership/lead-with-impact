<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead with Impact — Leadership Effectiveness Survey</title>
<link href="https://fonts.googleapis.com/css2?family=Salesforce+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Salesforce Sans', 'Segoe UI', system-ui, -apple-system, sans-serif; background: #021b40; min-height: 100vh; color: #181818; }

  /* ── Topbar ── */
  .sf-topbar { background: #010e22; padding: 12px 48px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .sf-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .sf-logo svg { width: 36px; height: 36px; }
  .sf-logo-text { color: white; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.02em; }
  .sf-topbar-right { font-size: 0.75rem; color: rgba(255,255,255,0.4); letter-spacing: 0.06em; text-transform: uppercase; }

  /* ── Survey header (non-intro screens) ── */
  .header { background: transparent; color: white; padding: 0 0 0; text-align: center; }
  .header-body { padding: 28px 24px 16px; }
  .header-body h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; color: white; }
  .header-body p { font-size: 0.85rem; color: rgba(255,255,255,0.5); max-width: 480px; margin: 0 auto; line-height: 1.5; }
  .progress-bar-wrap { background: rgba(255,255,255,0.1); border-radius: 99px; height: 4px; margin: 16px auto 0; max-width: 400px; overflow: hidden; }
  .progress-bar-fill { background: #4ade80; height: 100%; border-radius: 99px; transition: width 0.5s ease; width: 0%; }
  .progress-label { font-size: 0.72rem; color: rgba(255,255,255,0.4); margin-top: 6px; }

  /* ── INTRO HERO (Salesforce India style) ── */
  .intro-hero {
    background: #032d60;
    color: white;
    height: calc(100vh - 48px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .intro-hero-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    align-items: center;
    max-width: 100%;
    padding: 32px 64px;
    gap: 48px;
    width: 100%;
  }
  .intro-left {}
  .intro-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
    color: #4ade80; margin-bottom: 14px;
  }
  .intro-eyebrow .star { font-size: 0.9rem; }
  .intro-left h1 {
    font-size: clamp(1.8rem, 3vw, 2.6rem);
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 0;
  }
  .intro-left h1 span { color: #4ade80; }

  .intro-right {}
  .intro-right p {
    font-size: 0.92rem; line-height: 1.7; color: rgba(255,255,255,0.8);
    margin-bottom: 20px; max-width: 460px;
  }
  .intro-cta-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .btn-cta-primary {
    padding: 13px 28px; border-radius: 4px; font-size: 0.92rem; font-weight: 700;
    background: #0176d3; color: white; border: none; cursor: pointer;
    transition: background 0.15s, transform 0.15s; font-family: inherit;
  }
  .btn-cta-primary:hover { background: #0165b8; transform: translateY(-1px); }
  .btn-cta-outline {
    padding: 12px 28px; border-radius: 4px; font-size: 0.92rem; font-weight: 700;
    background: transparent; color: white; border: 1px solid rgba(255,255,255,0.4);
    cursor: pointer; transition: border-color 0.15s, background 0.15s; font-family: inherit;
  }
  .btn-cta-outline:hover { border-color: white; background: rgba(255,255,255,0.06); }

  .intro-trust {
    display: flex; gap: 20px; flex-wrap: wrap;
  }
  .trust-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 0.8rem; color: rgba(255,255,255,0.6);
  }
  .trust-item .ti-icon { color: #4ade80; font-size: 0.9rem; }

  /* ── Dark card grid (bottom of hero) ── */
  .intro-cards-strip {
    background: #0a1f3d;
    padding: 24px 64px 28px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .intro-cards-inner { max-width: 100%; }
  .intro-cards-title {
    font-size: 1.1rem; font-weight: 800; color: white; text-align: center;
    margin-bottom: 4px; letter-spacing: -0.01em;
  }
  .intro-cards-sub {
    font-size: 0.8rem; color: rgba(255,255,255,0.5); text-align: center;
    margin-bottom: 18px;
  }
  .intro-card-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
  }
  .intro-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 16px 14px;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    cursor: default;
  }
  .intro-card:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.18); transform: translateY(-2px); }
  .intro-card-icon { font-size: 1.3rem; margin-bottom: 8px; }
  .intro-card h4 { font-size: 0.82rem; font-weight: 700; color: white; margin-bottom: 4px; }
  .intro-card p { font-size: 0.72rem; color: rgba(255,255,255,0.5); line-height: 1.5; }

  .container { max-width: 720px; margin: 0 auto; padding: 28px 20px 60px; }
  .container.full-bleed { max-width: 100%; padding: 0; margin: 0; }

  /* ── Cards ── */
  .card { background: #0a1f3d; border: 1px solid rgba(255,255,255,0.09); border-radius: 10px; padding: 36px; margin-bottom: 20px; }
  .card h2 { font-size: 1.15rem; color: white; margin-bottom: 8px; font-weight: 700; }
  .card .subtitle { font-size: 0.9rem; color: rgba(255,255,255,0.55); margin-bottom: 24px; line-height: 1.6; }
  .card label { color: rgba(255,255,255,0.6); }

  /* ── Role selector ── */
  .role-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 12px; margin-top: 10px; }
  .role-tile { border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 18px 12px; text-align: center; cursor: pointer; transition: all 0.15s; user-select: none; background: rgba(255,255,255,0.04); }
  .role-tile:hover { border-color: #4ade80; background: rgba(74,222,128,0.07); }
  .role-tile.selected { border-color: #4ade80; background: rgba(74,222,128,0.12); box-shadow: 0 0 0 1px #4ade80; }
  .role-tile .role-icon { font-size: 1.6rem; margin-bottom: 8px; }
  .role-tile .role-name { font-size: 0.9rem; font-weight: 700; color: white; }
  .role-tile .role-desc { font-size: 0.72rem; color: rgba(255,255,255,0.45); margin-top: 3px; line-height: 1.4; }
  .role-tile.selected .role-name { color: #4ade80; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px; border-radius: 4px; font-size: 0.9rem; font-weight: 700; border: 1px solid transparent; cursor: pointer; transition: all 0.15s; letter-spacing: 0.01em; font-family: inherit; }
  .btn-primary { background: #0176d3; color: white; border-color: #0176d3; }
  .btn-primary:hover { background: #0165b8; box-shadow: 0 0 12px rgba(1,118,211,0.4); }
  .btn-primary:disabled { background: rgba(255,255,255,0.1); border-color: transparent; color: rgba(255,255,255,0.3); cursor: not-allowed; }
  .btn-secondary { background: transparent; color: white; border-color: rgba(255,255,255,0.3); }
  .btn-secondary:hover { border-color: white; background: rgba(255,255,255,0.06); }
  .btn-success { background: #2e844a; color: white; border-color: #2e844a; }
  .btn-success:hover { background: #27713f; box-shadow: 0 0 12px rgba(46,132,74,0.4); }

  /* ── Chat ── */
  .chat-card { background: #0a1f3d; border: 1px solid rgba(255,255,255,0.09); border-radius: 10px; overflow: hidden; }
  .answered-block { padding: 20px 28px; border-bottom: 1px solid rgba(255,255,255,0.06); animation: fadeIn 0.3s ease; }
  .question-block { padding: 28px 28px 0; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* ── Section divider ── */
  .section-divider {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 28px;
    background: rgba(1,118,211,0.12);
    border-bottom: 1px solid rgba(1,118,211,0.2);
    border-top: 1px solid rgba(1,118,211,0.2);
    animation: fadeIn 0.3s ease;
  }
  .section-divider-icon {
    width: 36px; height: 36px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0; background: rgba(255,255,255,0.08);
  }
  .section-divider-text h4 { font-size: 0.85rem; font-weight: 700; color: white; margin-bottom: 1px; }
  .section-divider-text p { font-size: 0.72rem; color: #4ade80; }

  .section-divider-icon.bp   { background: rgba(1,118,211,0.2); }
  .section-divider-icon.cl   { background: rgba(11,130,124,0.2); }
  .section-divider-icon.dp   { background: rgba(46,132,74,0.2); }
  .section-divider-icon.init { background: rgba(180,83,9,0.2); }
  .section-divider-icon.strat{ background: rgba(124,58,237,0.2); }
  .section-divider-icon.upsk { background: rgba(186,5,23,0.2); }

  /* ── Badges ── */
  .question-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .q-badge { font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .q-badge.bp    { background: rgba(1,118,211,0.2);   color: #60b0f4; }
  .q-badge.cl    { background: rgba(11,130,124,0.2);  color: #34d6cc; }
  .q-badge.dp    { background: rgba(46,132,74,0.2);   color: #4ade80; }
  .q-badge.init  { background: rgba(180,83,9,0.2);    color: #fbbf24; }
  .q-badge.strat { background: rgba(124,58,237,0.2);  color: #c4b5fd; }
  .q-badge.upsk  { background: rgba(186,5,23,0.2);    color: #fca5a5; }
  .q-badge.alloc { background: rgba(255,255,255,0.1); color: #e2e8f0; }

  /* ── Time allocation widget ── */
  .alloc-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .alloc-row { display: flex; align-items: center; gap: 12px; }
  .alloc-label { flex: 1; font-size: 0.88rem; color: rgba(255,255,255,0.75); display: flex; align-items: center; gap: 8px; }
  .alloc-icon { font-size: 1rem; width: 20px; }
  .alloc-input { width: 64px; padding: 6px 10px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; color: white; font-size: 0.95rem; font-weight: 700; text-align: center; outline: none; font-family: inherit; }
  .alloc-input:focus { border-color: #0176d3; box-shadow: 0 0 0 2px rgba(1,118,211,0.25); }
  .alloc-bar-track { flex: 1; background: rgba(255,255,255,0.07); border-radius: 99px; height: 6px; overflow: hidden; max-width: 180px; }
  .alloc-bar-fill { height: 100%; border-radius: 99px; background: #0176d3; transition: width 0.3s ease; }
  .alloc-total-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0 0; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 4px; }
  .alloc-total-label { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
  .alloc-total-num { font-size: 1.2rem; font-weight: 800; }
  .alloc-total-num.ok   { color: #4ade80; }
  .alloc-total-num.over { color: #f87171; }
  .alloc-total-num.under{ color: #fbbf24; }
  .q-number { font-size: 0.78rem; color: rgba(255,255,255,0.3); }

  .question-text { font-size: 1.05rem; font-weight: 600; color: white; line-height: 1.55; margin-bottom: 16px; }
  .answer-area { width: 100%; min-height: 120px; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; font-size: 0.95rem; line-height: 1.6; resize: vertical; outline: none; transition: border-color 0.15s, box-shadow 0.15s; font-family: inherit; color: white; background: rgba(255,255,255,0.05); }
  .answer-area:focus { border-color: #0176d3; box-shadow: 0 0 0 3px rgba(1,118,211,0.25); }
  .answer-area::placeholder { color: rgba(255,255,255,0.25); }
  .char-hint { font-size: 0.72rem; color: rgba(255,255,255,0.3); margin-top: 5px; text-align: right; }

  .question-actions { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px 24px; border-top: 1px solid rgba(255,255,255,0.06); margin-top: 16px; }
  .question-actions .hint { font-size: 0.75rem; color: rgba(255,255,255,0.3); }

  /* ── Section progress pills ── */
  .section-pills { display: flex; gap: 6px; flex-wrap: wrap; padding: 14px 28px 0; }
  .section-pill { padding: 4px 12px; border-radius: 99px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.3); }
  .section-pill.done    { background: rgba(46,132,74,0.2);  color: #4ade80; border-color: rgba(74,222,128,0.3); }
  .section-pill.current { background: rgba(1,118,211,0.2);  color: #60b0f4; border-color: rgba(96,176,244,0.4); }

  /* ── Complete ── */
  .complete-card { background: #0a1f3d; border: 1px solid rgba(255,255,255,0.09); border-radius: 10px; padding: 48px 32px; text-align: center; animation: fadeIn 0.5s ease; }
  .complete-icon { font-size: 3rem; margin-bottom: 16px; }
  .complete-card h2 { font-size: 1.4rem; color: white; margin-bottom: 10px; font-weight: 700; }
  .complete-card p { color: rgba(255,255,255,0.55); font-size: 0.95rem; max-width: 440px; margin: 0 auto 28px; line-height: 1.6; }
  .complete-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .summary-section { margin-top: 32px; text-align: left; }
  .summary-section h3 { font-size: 0.75rem; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  .summary-group-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(255,255,255,0.3); padding: 14px 0 6px; }
  .summary-item { border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; margin-bottom: 8px; overflow: hidden; }
  .summary-q { background: rgba(255,255,255,0.04); padding: 12px 16px; font-size: 0.88rem; font-weight: 600; color: rgba(255,255,255,0.8); cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .summary-q:hover { background: rgba(255,255,255,0.07); }
  .summary-chevron { flex-shrink: 0; transition: transform 0.2s; color: rgba(255,255,255,0.4); }
  .summary-chevron.open { transform: rotate(180deg); }
  .summary-a { padding: 12px 16px; font-size: 0.88rem; color: rgba(255,255,255,0.55); line-height: 1.6; display: none; border-top: 1px solid rgba(255,255,255,0.07); white-space: pre-wrap; }
  .summary-a.open { display: block; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #c23934; color: white; padding: 12px 20px; border-radius: 4px; font-size: 0.88rem; box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 999; animation: fadeIn 0.3s ease; max-width: 480px; text-align: center; }
  .toast.success { background: #2e844a; }

  .sf-footer { text-align: center; padding: 24px; font-size: 0.75rem; color: #a8a29e; }
  .sf-footer a { color: #0176d3; text-decoration: none; }

  @media (max-width: 900px) {
    .intro-hero { height: auto; }
    .intro-hero-split { grid-template-columns: 1fr; padding: 32px 24px; gap: 24px; }
    .intro-cards-strip { padding: 24px; }
    .intro-card-grid { grid-template-columns: repeat(3, 1fr); }
    .sf-topbar { padding: 12px 20px; }
  }
  @media (max-width: 520px) {
    .question-block, .section-pills { padding: 20px 16px 0; }
    .answered-block, .section-divider { padding: 16px; }
    .question-actions { padding: 12px 16px 18px; flex-direction: column; gap: 10px; align-items: stretch; }
    .complete-card { padding: 32px 20px; }
    .role-grid { grid-template-columns: 1fr 1fr; }
    .intro-card-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div id="globalTopbar" class="sf-topbar">
  <a class="sf-logo" href="https://www.salesforce.com" target="_blank">
    <svg viewBox="0 0 100 70" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M41.6 13.4a18.2 18.2 0 0 1 13-5.4c6.6 0 12.4 3.5 15.7 8.8a20.4 20.4 0 0 1 8.3-1.8c11.3 0 20.4 9.2 20.4 20.6S89.9 56.2 78.6 56.2H24.2C13.6 56.2 5 47.6 5 37c0-9.8 7.2-17.8 16.6-19.1a21.3 21.3 0 0 1 20-4.5z" fill="white"/>
    </svg>
    <span class="sf-logo-text">Salesforce</span>
  </a>
  <div class="sf-topbar-right">GDC Internal</div>
</div>

<div id="surveyHeader" class="header" style="display:none">
  <div class="header-body">
    <h1>Lead with Impact</h1>
    <p>Leadership Effectiveness Survey — GDC Directors</p>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">Not started</div>
  </div>
</div>

<div id="app"></div>
<div class="sf-footer" style="background:#010e22;color:rgba(255,255,255,0.3);border-top:1px solid rgba(255,255,255,0.06);">
  &copy; 2026 Salesforce, Inc. &nbsp;|&nbsp; GDC Internal Use Only &nbsp;|&nbsp;
  <a href="https://www.salesforce.com/company/privacy/" target="_blank" style="color:rgba(255,255,255,0.4);">Privacy</a>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const SHEETS_URL = 'https://script.google.com/a/macros/salesforce.com/s/AKfycbydEaBPMG7kn_621cxqubHvlYaOo98S15fFzmVwHx_xdqr5bUfxsnYeuUCS3JdmNatW/exec';

// ─── Roles ───────────────────────────────────────────────────────────────────
const ROLES = [
  { id: 'BP',    name: 'BP',    icon: '🤝', desc: 'Business Partner' },
  { id: 'CL',    name: 'CL',    icon: '☁️', desc: 'Cloud Leader' },
  { id: 'DP',    name: 'DP',    icon: '🚀', desc: 'Delivery Partner' },
  { id: 'OTHER', name: 'Other', icon: '➕', desc: 'Other / Initiative Lead' }
];

// ─── Sections ────────────────────────────────────────────────────────────────
const SECTIONS = [
  { id: 'allocation',  label: '40hr Allocation',        icon: '⏱',  cls: 'alloc',roleRequired: null },
  { id: 'bp',          label: 'Business Partner',       icon: '🤝', cls: 'bp',   roleRequired: 'BP' },
  { id: 'cl',          label: 'Cloud Leader',           icon: '☁️', cls: 'cl',   roleRequired: 'CL' },
  { id: 'dp',          label: 'Delivery Partner',       icon: '🚀', cls: 'dp',   roleRequired: 'DP' },
  { id: 'initiatives', label: 'GDC Org Initiatives',    icon: '🏢', cls: 'init', roleRequired: null },
  { id: 'strategic',   label: 'Strategic Thinking',     icon: '🎯', cls: 'strat',roleRequired: null },
  { id: 'upskilling',  label: 'Upskilling & Upgrading', icon: '🧠', cls: 'upsk', roleRequired: null }
];

// ─── Time Allocation Question (always first, special type) ───────────────────
const TIME_ALLOCATION_QUESTION = {
  id: 'time_allocation', section: 'allocation', label: 'Weekly Time Allocation',
  type: 'allocation',
  text: 'Thinking about a typical week, how do you spend your ~40 hours? Drag or type hours for each area — the total will update as you go.',
  buckets: [
    { id: 'client_delivery',   label: 'Client-Facing Delivery',         icon: '💼' },
    { id: 'gtm_presales',      label: 'GTM & Pre-Sales',                icon: '🤝' },
    { id: 'internal_meetings', label: 'Internal Meetings & Admin',       icon: '📅' },
    { id: 'people_mgmt',       label: 'People & Team Management',       icon: '👥' },
    { id: 'strategic',         label: 'Strategic Planning & Leadership', icon: '🎯' },
    { id: 'learning',          label: 'Learning & Upskilling (incl. AI)',icon: '🧠' },
    { id: 'gdc_initiatives',   label: 'GDC Org Initiatives',            icon: '🏢' },
    { id: 'other',             label: 'Other',                          icon: '➕' }
  ]
};

// ─── Question Bank (structured — no open-ended) ───────────────────────────────
// Types: slider, radio, multiselect, rating, number
const QUESTION_BANK = [

  // ── BP ──
  {
    id: 'bp_highvalue', section: 'bp', label: 'High-Value Activities',
    type: 'multiselect', required: true,
    text: 'As a Business Partner, which activities create the most impact for clients and GDC? (Select all that apply)',
    options: ['Client relationship building','GTM & pre-sales','Account strategy & planning','Executive stakeholder engagement','Opportunity qualification','Product/Cloud advisory','Internal alignment & governance','Team development']
  },
  {
    id: 'bp_gtm_hrs', section: 'bp', label: 'GTM Time Investment',
    type: 'slider', required: true,
    text: 'What % of your week is genuinely spent on GTM and pre-sales activities?',
    min: 0, max: 100, step: 5, unit: '%', ideal: 30
  },

  // ── CL ──
  {

// ─── Bucket deep-dive question generator ─────────────────────────────────────
// Called after allocation is saved — generates one commentary question per bucket with hours > 0
function buildBucketDeepDives() {
  const BUCKET_PROMPTS = {
    client_delivery: {
      label: 'Client-Facing Delivery',
      question: () => `When you think about the time you spend in client-facing delivery, what does the most meaningful part of that look like for you? What kind of work energises you here, and where do you feel you could add even more value if the conditions were right?`,
      placeholder: 'e.g. "The most rewarding time is the strategic advisory conversations — helping shape a client\'s roadmap or solving a complex delivery challenge. What I\'d love more of is early engagement on new programmes before scope is locked, because that\'s where I can make the biggest difference…"'
    },
    gtm_presales: {
      label: 'GTM & Pre-Sales',
      question: () => `How would you describe your involvement in GTM and pre-sales — what role do you play and what does success look like for you in this space? What would allow you to contribute even more effectively here?`,
      placeholder: 'e.g. "I\'m most effective when I\'m brought in early to shape the solution narrative — that\'s where my experience adds real weight. When I\'m pulled in late just to review a deck, it\'s hard to add the kind of value I know I\'m capable of. I\'d love to be more connected to pipeline conversations earlier…"'
    },
    internal_meetings: {
      label: 'Internal Meetings & Admin',
      question: () => `Internal meetings and admin are a reality for all of us — what are the ones you genuinely value and feel are a good use of your time? And if you could redesign how this time works, what would you change?`,
      placeholder: 'e.g. "The weekly leadership alignment call is valuable — it keeps me connected across the region. But a lot of the reporting cycle feels like it could be streamlined or delegated. If I could reclaim that time, I\'d reinvest it into coaching my team and deeper client engagement…"'
    },
    people_mgmt: {
      label: 'People & Team Management',
      question: () => `People leadership is one of the most important parts of a Director\'s role — what does that look like for you in practice? Where do you feel most effective, and where do you wish you had more capacity or support?`,
      placeholder: 'e.g. "The 1:1 conversations and career development discussions are where I feel most impactful — helping people grow is genuinely rewarding. Where I feel stretched is when people management becomes reactive, dealing with issues that could have been avoided with stronger next-line leadership. More support there would free me up significantly…"'
    },
    strategic: {
      label: 'Strategic Planning & Leadership',
      question: () => `Strategic thinking and planning is where Directors can have outsized impact — what does that time look like for you in a good week? What enables it, and what most often gets in the way?`,
      placeholder: 'e.g. "When I do get uninterrupted strategic time, I use it to think about our practice direction, identify emerging client needs, and shape our narrative with regional leadership. The challenge is protecting it — it\'s often the first thing to go when something urgent comes in. What would help most is…"'
    },
    learning: {
      label: 'Learning & Upskilling',
      question: () => `Staying sharp and relevant is something all great leaders prioritise — what are you currently learning or developing, and how is it connecting to your work? What would help you invest in this more consistently?`,
      placeholder: 'e.g. "I\'ve been deepening my understanding of AI and Agentforce — both because it\'s genuinely exciting and because clients are asking about it in almost every conversation. The challenge is carving out consistent time for it. When I do, I find it directly improves the quality of conversations I\'m having…"'
    },
    gdc_initiatives: {
      label: 'GDC Org Initiatives',
      question: () => `GDC org initiatives are how we build the organisation collectively — which ones are you involved in, and what impact do you feel they are having? What would make your contribution here more meaningful or sustainable?`,
      placeholder: 'e.g. "I\'m contributing to the talent pipeline initiative and the knowledge management workgroup. The talent work feels impactful — I can see it changing how we hire. The knowledge management one is harder to move forward given everyone\'s bandwidth. I\'d feel better about these if there was clearer executive sponsorship and defined outcomes…"'
    },
    other: {
      label: 'Other',
      question: () => `It\'s natural that some of our time doesn\'t fit neatly into categories — what does this time cover for you, and how do you feel about it? Is it work you value, or something you\'d like to see shift over time?`,
      placeholder: 'e.g. "A lot of this is ad-hoc requests and cross-functional asks that land on me because of relationships I\'ve built. Some of it is genuinely important and I\'m glad to help. Some of it probably shouldn\'t be mine to carry — I\'d love to work on building the systems that mean these don\'t all route to me…"'
    }
  };

  const allocSection = SECTIONS.find(s => s.id === 'allocation');
  const deepDives = [];
  TIME_ALLOCATION_QUESTION.buckets.forEach(b => {
    const hrs = state.timeAllocation[b.id] || 0;
    if (hrs <= 0) return;
    const prompt = BUCKET_PROMPTS[b.id];
    if (!prompt) return;
    deepDives.push({
      id: `deepdive_${b.id}`,
      section: 'allocation',
      label: `${b.icon} ${prompt.label}`,
      type: 'commentary',
      text: prompt.question(hrs, state.selectedRoles),
      placeholder: prompt.placeholder,
      sectionMeta: allocSection,
      isFirstInSection: false,
      bucketId: b.id,
      bucketHrs: hrs
    });
  });
  return deepDives;
}

// ─── Queue Builder ────────────────────────────────────────────────────────────
function buildQueue() {
  const activeSections = SECTIONS.filter(s =>
    s.roleRequired === null || state.selectedRoles.includes(s.roleRequired)
  );
  const q = [];
  activeSections.forEach(sec => {
    if (sec.id === 'allocation') {
      q.push({ ...TIME_ALLOCATION_QUESTION, sectionMeta: sec, isFirstInSection: true });
      // Deep-dive questions are injected AFTER allocation is saved — see injectDeepDives()
      return;
    }
    const sectionQs = QUESTION_BANK.filter(qb => qb.section === sec.id);
    sectionQs.forEach((qb, idx) => {
      q.push({ ...qb, sectionMeta: sec, isFirstInSection: idx === 0 });
    });
  });
  return q;
}

// Called right after the allocation answer is saved to inject deep-dives into queue
function injectDeepDives() {
  const deepDives = buildBucketDeepDives();
  if (!deepDives.length) return;
  // Mark first one
  deepDives[0].isFirstInSection = false;
  // Insert after position 0 (the allocation question itself)
  state.queue.splice(1, 0, ...deepDives);
}

// ─── Active sections helper ───────────────────────────────────────────────────
function getActiveSections() {
  return SECTIONS.filter(s => s.roleRequired === null || state.selectedRoles.includes(s.roleRequired));
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const header = document.getElementById('surveyHeader');
  if (state.screen === 'intro') {
    if (header) header.style.display = 'none';
    app.className = 'full-bleed';
    app.innerHTML = renderIntro();
  } else {
    app.className = 'container';
    if (header) header.style.display = 'block';
    if      (state.screen === 'roles')    app.innerHTML = renderRoles();
    else if (state.screen === 'survey')   app.innerHTML = renderSurvey();
    else if (state.screen === 'review')   app.innerHTML = renderReview();
    else if (state.screen === 'complete') app.innerHTML = renderComplete();
  }
  updateProgress();
  bindEvents();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderSurvey() {
  const currentQ = state.queue[state.queueIdx];
  if (!currentQ) { state.screen = 'review'; return renderReview(); }

  const activeSections = getActiveSections();
  const currentSectionIdx = activeSections.findIndex(s => s.id === currentQ.section);
  const totalQs = state.queue.length;

  const pills = activeSections.map((s, i) => {
    let cls = '';
    if (i < currentSectionIdx) cls = 'done';
    else if (i === currentSectionIdx) cls = 'current';
    return `<span class="section-pill ${cls}">${s.icon} ${s.label}</span>`;
  }).join('');

  const curDivider = currentQ.isFirstInSection ? renderSectionDivider(currentQ.sectionMeta) : '';

  return `
    <div class="chat-card">
      <div class="section-pills">${pills}</div>
      ${curDivider}
      <div class="question-block" id="currentBlock">
        <div class="question-meta">
          <span class="q-badge ${currentQ.sectionMeta.cls}">${currentQ.label}</span>
          <span class="q-number">Question ${state.queueIdx + 1} of ${totalQs}</span>
        </div>
        <div class="question-text">${esc(currentQ.text)}</div>
        ${currentQ.helpText ? `<div style="font-size:0.78rem;color:rgba(255,255,255,0.4);margin-bottom:14px;">${esc(currentQ.helpText)}</div>` : ''}
        ${renderInput(currentQ)}
        ${currentQ.type !== 'allocation' && currentQ.type !== 'number' && currentQ.type !== 'commentary' ? renderCommentBox(currentQ) : ''}
      </div>
      <div class="question-actions">
        <button class="btn btn-secondary" id="backBtn">← Back</button>
        <button class="btn btn-primary" id="nextBtn">
          ${state.queueIdx === state.queue.length - 1 ? 'Review Answers →' : 'Next →'}
        </button>
      </div>
    </div>`;
}

function renderInput(q) {
  const saved = state.allQA.find(a => a.qid === q.id);

  if (q.type === 'allocation') {
    const buckets = q.buckets;
    const total = buckets.reduce((s, b) => s + (state.timeAllocation[b.id] || 0), 0);
    const cls = total === 40 ? 'ok' : total > 40 ? 'over' : 'under';
    return `
      <div class="alloc-grid" id="allocGrid">
        ${buckets.map(b => {
          const hrs = state.timeAllocation[b.id] || 0;
          const barW = Math.min(100, Math.round((hrs / 40) * 100));
          return `<div class="alloc-row">
            <div class="alloc-label"><span class="alloc-icon">${b.icon}</span>${b.label}</div>
            <input class="alloc-input" type="number" min="0" max="40" step="0.5" data-bucket="${b.id}" value="${hrs}" />

  // Commentary type — full-page rich text, this IS the answer
  if (q.type === 'commentary') {
    const saved = state.allQA.find(a => a.qid === q.id)?.exampleText || '';
    const wordCount = saved.trim() ? saved.trim().split(/\s+/).length : 0;
    return `

          style="width:100%;background:rgba(255,255,255,0.06);border:2px solid rgba(1,118,211,0.5);border-radius:8px;color:rgba(255,255,255,0.92);font-size:0.92rem;padding:14px 16px;resize:vertical;font-family:inherit;outline:none;line-height:1.7;transition:border 0.15s;"
          onfocus="this.style.borderColor='#0176d3';this.style.boxShadow='0 0 0 3px rgba(1,118,211,0.2)'"
          onblur="this.style.borderColor='rgba(1,118,211,0.5)';this.style.boxShadow='none'"
          oninput="updateWordCount(this)"
        >${esc(saved)}</textarea>

          <div style="font-size:0.72rem;color:rgba(255,255,255,0.3);">Be specific — the richer your response, the more useful the insights. Aim for at least 3–4 sentences.</div>

        </div>
      </div>`;
  }

  return '';
}

function updateWordCount(ta) {
  const words = ta.value.trim() ? ta.value.trim().split(/\s+/).length : 0;
  const badge = document.getElementById('wordCountBadge');
  if (!badge) return;
  const ok = words >= 30;
  badge.textContent = words + ' words' + (ok ? ' ✓' : ' (aim for 30+)');
  badge.style.background = ok ? 'rgba(74,222,128,0.15)' : 'rgba(255,255,255,0.07)';
  badge.style.color = ok ? '#4ade80' : 'rgba(255,255,255,0.3)';
}

function updateProgress() {
  const fill = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');
  if (!fill) return;
  let pct = 0, text = 'Not started';
  if (state.screen === 'intro')    { pct = 0;   text = 'Welcome'; }
  else if (state.screen === 'roles')    { pct = 5;   text = 'Step 1 — Select your roles'; }
  else if (state.screen === 'review')   { pct = 95;  text = 'Review your answers'; }
  else if (state.screen === 'complete') { pct = 100; text = 'Submitted!'; }
  else if (state.screen === 'survey') {
    const total = state.queue.length || 1;
    pct = Math.round(((state.queueIdx + 1) / (total + 1)) * 90) + 5;
    const currentQ = state.queue[state.queueIdx];
    if (currentQ) text = `${currentQ.sectionMeta.icon} ${currentQ.sectionMeta.label} · Q${state.queueIdx + 1} of ${total}`;
  }
  fill.style.width = pct + '%';
  label.textContent = text;
}

// ─── Collect answer from DOM ──────────────────────────────────────────────────
function collectAnswer(q) {
  const exampleText = document.getElementById('exampleInput')?.value.trim() || '';

  // Commentary questions — the textarea IS the answer
  if (q.type === 'commentary') {
    return { rawValue: exampleText, answer: exampleText, displayAnswer: exampleText.slice(0, 60) + (exampleText.length > 60 ? '…' : ''), exampleText };
  }

  if (q.type === 'allocation') {
    const buckets = {};
    document.querySelectorAll('.alloc-input').forEach(inp => {
      buckets[inp.dataset.bucket] = parseFloat(inp.value) || 0;
    });
    const overtimeReasons = [...document.querySelectorAll('input[name="overtime_reasons"]:checked')].map(el => el.value);
    const overtimeOffload = document.querySelector('input[name="overtime_offload"]:checked')?.value || '';
    const total = Object.values(buckets).reduce((s, v) => s + v, 0);
    state.timeAllocation = buckets;
    const summary = TIME_ALLOCATION_QUESTION.buckets
      .filter(b => buckets[b.id] > 0)
      .map(b => `${b.label}: ${buckets[b.id]}h`).join(', ');
    return {
      rawValue: { buckets, overtimeReasons, overtimeOffload },
      answer: `Total: ${total}h. ` + summary + (overtimeReasons.length ? `. Overtime areas: ${overtimeReasons.join(', ')}` : '') + (overtimeOffload ? `. Would offload: ${overtimeOffload}` : ''),
      displayAnswer: `${total}h total`,
      exampleText: ''
    };
  }
  if (q.type === 'slider') {
    const val = parseFloat(document.getElementById('sliderInput')?.value || q.min);
    return { rawValue: val, answer: `${val}${q.unit || ''}`, displayAnswer: `${val}${q.unit || ''}`, exampleText };
  }
  if (q.type === 'radio') {
    const val = document.querySelector('input[name="radioQ"]:checked')?.value || '';
    return { rawValue: val, answer: val, displayAnswer: val, exampleText };
  }
  if (q.type === 'multiselect') {
    const vals = [...document.querySelectorAll('input[name="multiQ"]:checked')].map(el => el.value);
    return { rawValue: vals, answer: vals.join(', '), displayAnswer: vals.join(', '), exampleText };
  }
  if (q.type === 'rating') {
    const val = parseInt(document.querySelector('.rating-btn.selected')?.dataset.val || 0);
    const lbl = val ? q.labels[val - 1] : '';
    return { rawValue: val, answer: `${val} — ${lbl}`, displayAnswer: `${val}/5 — ${lbl}`, exampleText };
  }
  if (q.type === 'number') {
    const val = parseFloat(document.getElementById('numberInput')?.value || 0);
    return { rawValue: val, answer: `${val} ${q.unit || ''}`, displayAnswer: `${val} ${q.unit || ''}`, exampleText: '' };
  }
  return { rawValue: null, answer: '', displayAnswer: '', exampleText: '' };
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function goNext() {
  const currentQ = state.queue[state.queueIdx];
  if (!currentQ) { state.screen = 'review'; render(); return; }

  const { rawValue, answer, displayAnswer, exampleText } = collectAnswer(currentQ);

  // Validate structured selection
  if (!rawValue && rawValue !== 0 && rawValue !== '') {
    showToast('Please make a selection before continuing.'); return;
  }

  // Validate commentary (deep-dive) — must have 30+ words
  if (currentQ.type === 'commentary') {
    const wc = exampleText.trim() ? exampleText.trim().split(/\s+/).length : 0;
    if (wc < 30) {
      const ta = document.getElementById('exampleInput');
      if (ta) { ta.style.borderColor = '#f87171'; ta.style.boxShadow = '0 0 0 3px rgba(248,113,113,0.2)'; ta.focus(); }
      showToast(`A little more detail would be really valuable — just a few more sentences (${wc} words so far).`); return;
    }
  }

  // Validate example box on structured questions — 30+ words required
  const needsExample = currentQ.type !== 'allocation' && currentQ.type !== 'number' && currentQ.type !== 'commentary';
  if (needsExample) {
    const wc = exampleText.trim() ? exampleText.trim().split(/\s+/).length : 0;
    if (wc < 30) {
      const ta = document.getElementById('exampleInput');
      if (ta) { ta.style.borderColor = '#f87171'; ta.style.boxShadow = '0 0 0 3px rgba(248,113,113,0.2)'; ta.focus(); }
      showToast(`A little more detail helps — just a few more sentences (${wc} words so far).`); return;
    }
  }

  const existingIdx = state.allQA.findIndex(a => a.qid === currentQ.id);
  const entry = { qid: currentQ.id, sectionId: currentQ.section, sectionCls: currentQ.sectionMeta.cls, label: currentQ.label, question: currentQ.text, answer, displayAnswer, rawValue, exampleText };
  if (existingIdx >= 0) state.allQA[existingIdx] = entry;
  else state.allQA.push(entry);

  // After allocation is saved, inject personalised bucket deep-dives into queue
  if (currentQ.type === 'allocation' && !state.deepDivesInjected) {
    state.deepDivesInjected = true;
    injectDeepDives();
  }

  state.queueIdx++;
  if (state.queueIdx >= state.queue.length) state.screen = 'review';
  render();
}

function goBack() {
  if (state.screen === 'survey' && state.queueIdx > 0) {
    state.queueIdx--;
    render();
  } else if (state.screen === 'survey' && state.queueIdx === 0) {
    state.screen = 'roles';
    render();
  } else if (state.screen === 'review') {
    state.screen = 'survey';
    state.queueIdx = state.queue.length - 1;
    render();
  }
}

async function submitToSheets() {
  state.submitting = true; render();
  try {
    const payload = {
      respondentId: state.respondentId,
      roles: state.selectedRoles,
      timeAllocation: state.timeAllocation,
      responses: state.allQA.map(({ qid, sectionId, label, question, answer, exampleText }) => ({ qid, sectionId, label, question, answer, example: exampleText || '' }))
    };
    await fetch(SHEETS_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    state.screen = 'complete';
  } catch (e) {
    showToast('Submission failed — please download JSON instead.');
    state.submitting = false;
  }
  render();
}

function downloadJSON() {
  const data = { respondentId: state.respondentId, roles: state.selectedRoles, timeAllocation: state.timeAllocation, timestamp: new Date().toISOString(), responses: state.allQA };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `survey_${state.respondentId}_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function toggleSummary(i) {
  document.getElementById('sum-' + i)?.classList.toggle('open');
  document.getElementById('chev-' + i)?.classList.toggle('open');
}

// ─── Events ───────────────────────────────────────────────────────────────────
function bindEvents() {
  // Intro
  document.getElementById('introNextBtn')?.addEventListener('click', () => { state.screen = 'roles'; render(); });

  // Roles
  document.getElementById('backToIntroBtn')?.addEventListener('click', () => { state.screen = 'intro'; render(); });
  document.getElementById('roleGrid')?.addEventListener('click', e => {
    const tile = e.target.closest('.role-tile'); if (!tile) return;
    const roleId = tile.dataset.role;
    if (state.selectedRoles.includes(roleId)) { state.selectedRoles = state.selectedRoles.filter(r => r !== roleId); tile.classList.remove('selected'); }
    else { state.selectedRoles.push(roleId); tile.classList.add('selected'); }
  });
  document.getElementById('beginBtn')?.addEventListener('click', () => {
    state.queue = buildQueue(); state.queueIdx = 0; state.deepDivesInjected = false; state.screen = 'survey'; render();
  });

  // Survey nav
  document.getElementById('nextBtn')?.addEventListener('click', goNext);
  document.getElementById('backBtn')?.addEventListener('click', goBack);
  document.getElementById('backToSurveyBtn')?.addEventListener('click', goBack);

  // Slider live update
  const slider = document.getElementById('sliderInput');
  if (slider) {
    const valEl = document.getElementById('sliderVal');
    const currentQ = state.queue[state.queueIdx];
    slider.addEventListener('input', () => {
      if (valEl) valEl.textContent = slider.value + (currentQ?.unit || '');
    });
  }

  // Rating buttons
  document.querySelectorAll('.rating-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.rating-btn').forEach(b => {
        b.classList.remove('selected');
        b.style.borderColor = 'rgba(255,255,255,0.12)';
        b.style.background = 'rgba(255,255,255,0.04)';
        b.style.color = 'rgba(255,255,255,0.7)';
      });
      btn.classList.add('selected');
      btn.style.borderColor = '#4ade80';
      btn.style.background = 'rgba(74,222,128,0.15)';
      btn.style.color = '#4ade80';
    });
  });

  // Radio highlight
  document.querySelectorAll('#radioGroup input[type=radio]').forEach(inp => {
    inp.addEventListener('change', () => {
      document.querySelectorAll('#radioGroup label').forEach(lbl => {
        const isChk = lbl.querySelector('input')?.checked;
        lbl.style.borderColor = isChk ? '#0176d3' : 'rgba(255,255,255,0.1)';
        lbl.style.background = isChk ? 'rgba(1,118,211,0.15)' : 'rgba(255,255,255,0.03)';
      });
    });
  });

  // Checkbox highlight
  document.querySelectorAll('[id^="multiGroup"] input[type=checkbox]').forEach(inp => {
    inp.addEventListener('change', () => {
      const lbl = inp.closest('label');
      lbl.style.borderColor = inp.checked ? '#0176d3' : 'rgba(255,255,255,0.1)';
      lbl.style.background = inp.checked ? 'rgba(1,118,211,0.15)' : 'rgba(255,255,255,0.03)';
    });
  });

  // Allocation live update
  document.querySelectorAll('.alloc-input').forEach(inp => {
    inp.addEventListener('input', () => {
      const bucketId = inp.dataset.bucket;
      const val = parseFloat(inp.value) || 0;
      const bar = document.getElementById('bar-' + bucketId);
      if (bar) bar.style.width = Math.min(100, Math.round((val / 40) * 100)) + '%';
      const total = [...document.querySelectorAll('.alloc-input')].reduce((s, i) => s + (parseFloat(i.value) || 0), 0);
      const el = document.getElementById('allocTotal');
      if (el) {
        el.textContent = total + ' / 40';
        el.className = 'alloc-total-num ' + (total === 40 ? 'ok' : total > 40 ? 'over' : 'under');
      }
      const ot = document.getElementById('allocOvertime');
      if (ot) ot.style.display = total > 40 ? '' : 'none';
    });
  });

  // Submit & download
  document.getElementById('submitBtn')?.addEventListener('click', submitToSheets);
  document.getElementById('downloadBtn')?.addEventListener('click', downloadJSON);
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastTimer;
function showToast(msg, type = 'error') {
  document.querySelector('.toast')?.remove();
  clearTimeout(toastTimer);
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'success' ? ' success' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 4000);
}

render();
</script>
</body>
</html>
